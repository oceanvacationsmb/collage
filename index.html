<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Vacations Collage Creator</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial; background:#f4f4f4; }
    .wrap { max-width:1200px; margin:auto; padding:24px; }
    .panel { background:#fff; padding:20px; border-radius:16px; box-shadow:0 6px 20px rgba(0,0,0,.08); }
    .upload-row { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
    .drop-zone { border:2px dashed #bbb; border-radius:18px; min-height:170px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .drop-zone.dragover { border-color:#111; }
    input[type=file] { display:none; }
    .controls { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-top:20px; }
    select,button { padding:12px; border-radius:10px; border:1px solid #ccc; width:100%; }
    button { background:#111; color:#fff; border:none; cursor:pointer; }
    canvas { width:100%; margin-top:20px; border-radius:16px; }
  </style>
</head>
<body>
<div class="wrap">
<div class="panel">
<h2>Ocean Vacations Collage Creator</h2>

<div class="upload-row">
<div>
<label>Photos (4+)</label>
<div id="photoDrop" class="drop-zone">Drag Photos</div>
<input id="photoInput" type="file" multiple accept="image/*">
</div>

<div>
<label>Logo</label>
<div style="font-size:14px;color:#666">Preloaded logo ready</div>
</div>
</div>

<div class="controls">
<div>
<label>Use Logo</label>
<select id="useLogo" onchange="buildCollage()">
<option value="no">Without Logo</option>
<option value="yes" selected>With Logo</option>
</select>
</div>

<div>
<button onclick="buildCollage()">Create</button>
</div>

<div>
<button onclick="downloadJPG()">Download</button>
</div>
</div>
</div>

<canvas id="canvas"></canvas>
</div>

<script>
const photoInput = document.getElementById('photoInput');
const photoDrop = document.getElementById('photoDrop');
const useLogoSelect = document.getElementById('useLogo');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const LOGO_URL = "https://oceanvacationsmb.github.io/collage/akwtqkqugqkkxyijkwtb.png";

let photos = [];
let logoImg = null;

function readImage(file){
 return new Promise(res=>{
  const r=new FileReader();
  r.onload=()=>{
   const img=new Image();
   img.onload=()=>res(img);
   img.src=r.result;
  };
  r.readAsDataURL(file);
 });
}

function preloadLogo(){
 return new Promise(res=>{
  const img=new Image();
  img.crossOrigin="anonymous";
  img.onload=()=>{
    logoImg = img;
    res();
  };
  img.onerror=()=>res();
  img.src = LOGO_URL;
 });
}

window.addEventListener('load', async () => {
  await preloadLogo();
  buildCollage();
});

photoInput.onchange = async ()=>{
 for(const f of photoInput.files){
  photos.push(await readImage(f));
 }
 buildCollage();
}

photoDrop.onclick = ()=>photoInput.click();
photoDrop.ondrop = async e=>{
 e.preventDefault();
 for(const f of e.dataTransfer.files){
  photos.push(await readImage(f));
 }
 buildCollage();
}
photoDrop.ondragover = e=>e.preventDefault();

function layout(count){
 if(count<=4) return [2,2];
 if(count<=6) return [3,2];
 return [3,3];
}

function drawFit(img,x,y,w,h){
 ctx.save();
 ctx.beginPath();
 ctx.rect(x,y,w,h);
 ctx.clip();
 ctx.fillStyle="#fff";
 ctx.fillRect(x,y,w,h);

 let s=Math.min(w/img.width,h/img.height);
 let nw=img.width*s, nh=img.height*s;
 ctx.drawImage(img,x+(w-nw)/2,y+(h-nh)/2,nw,nh);
 ctx.restore();
}

function buildCollage(){
 if(photos.length<4){
  canvas.width=1200; canvas.height=800;
  ctx.fillText("Add 4+ photos",600,400);
  return;
 }

 const [cols,rows]=layout(photos.length);
 const gap=24, w=700, h=700;

 canvas.width=cols*w+(cols+1)*gap;
 canvas.height=rows*h+(rows+1)*gap;

 ctx.fillStyle="#fff";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 photos.forEach((img,i)=>{
  let c=i%cols, r=Math.floor(i/cols);
  let x=gap+c*(w+gap), y=gap+r*(h+gap);

  drawFit(img,x,y,w,h);
 });

 if(useLogoSelect.value==="yes" && logoImg){
   let size=240;
   drawFit(logoImg,(canvas.width-size)/2,(canvas.height-size)/2,size,size);
 }
}

function downloadJPG(){
 let a=document.createElement('a');
 a.href=canvas.toDataURL("image/jpeg",0.95);
 a.download="collage.jpg";
 a.click();
}
</script>
</body>
</html>
