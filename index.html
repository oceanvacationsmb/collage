<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Vacations Collage Creator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      padding: 20px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .controls {
      background: #fff;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .controls label {
      font-weight: bold;
    }

    input[type="file"] {
      padding: 8px;
      background: #f7f7f7;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      border: none;
      background: #0b6b88;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    button:hover {
      background: #084f66;
    }

    .preview-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: #fff;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }

    .panel h2 {
      margin-top: 0;
      font-size: 20px;
      text-align: center;
    }

    .hint {
      font-size: 13px;
      text-align: center;
      color: #666;
      margin-bottom: 12px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      min-height: 260px;
      border: 2px dashed #b8c4cc;
      border-radius: 14px;
      padding: 12px;
      background: #fafafa;
      align-content: start;
    }

    .image-grid.drag-active {
      border-color: #0b6b88;
      background: #eef8fb;
    }

    .drop-message {
      grid-column: 1 / -1;
      height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #666;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
    }

    .drop-message span {
      margin-top: 8px;
      font-size: 13px;
      font-weight: normal;
      color: #888;
    }

    .image-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #ddd;
      background: #eee;
      cursor: grab;
      height: 120px;
      user-select: none;
    }

    .image-item:active {
      cursor: grabbing;
    }

    .image-item.dragging {
      opacity: 0.35;
    }

    .image-item.drag-over {
      border-color: #0b6b88;
      box-shadow: 0 0 0 3px rgba(11,107,136,0.2);
    }

    .image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .order-number {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(180,0,0,0.85);
      color: #fff;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      padding: 0;
      line-height: 24px;
      font-size: 14px;
      cursor: pointer;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: white;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .preview-section {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .image-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Ocean Vacations Collage Creator</h1>

    <input type="file" id="photoInput" accept="image/*" multiple hidden />

    <div class="controls">
      <div class="toggle-row">
        <input type="checkbox" id="logoToggle" checked />
        <label for="logoToggle">Use Logo</label>
      </div>

      <button id="downloadBtn">Download Collage</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div class="preview-section">
      <div class="panel">
        <div id="imageGrid" class="image-grid"></div>
      </div>

      <div class="panel">
        <h2>Collage Preview</h2>
        <canvas id="collageCanvas" width="1200" height="900"></canvas>
      </div>
    </div>
  </div>

  <script>
    const photoInput = document.getElementById('photoInput');
    const imageGrid = document.getElementById('imageGrid');
    const canvas = document.getElementById('collageCanvas');
    const ctx = canvas.getContext('2d');
    const logoToggle = document.getElementById('logoToggle');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');

    let photos = [];
    let dragStartIndex = null;
    let logoReady = false;
    let logoFailed = false;

    const logo = new Image();
    logo.crossOrigin = 'anonymous';
    const logoSources = [
      'https://oceanvacationsmb.github.io/collage/akwtqkqugqkkxyijkwtb.png'
    ];

    function preloadLogo(sourceIndex = 0) {
      if (sourceIndex >= logoSources.length) {
        logoReady = false;
        logoFailed = true;
        drawCollage();
        return;
      }

      logo.onload = () => {
        logoReady = true;
        logoFailed = false;
        drawCollage();
      };

      logo.onerror = () => {
        logoReady = false;
        logoFailed = true;
        preloadLogo(sourceIndex + 1);
      };

      logo.src = logoSources[sourceIndex] + '?v=' + Date.now();
    }

    preloadLogo();

    photoInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files || []).filter(file => file.type.startsWith('image/'));
      await addPhotos(files);
      photoInput.value = '';
    });

    imageGrid.addEventListener('click', (e) => {
      if (photos.length === 0 || e.target.classList.contains('drop-message') || e.target.closest('.drop-message')) {
        photoInput.click();
      }
    });

    imageGrid.addEventListener('dragover', (e) => {
      e.preventDefault();
      imageGrid.classList.add('drag-active');
    });

    imageGrid.addEventListener('dragleave', (e) => {
      if (!imageGrid.contains(e.relatedTarget)) {
        imageGrid.classList.remove('drag-active');
      }
    });

    imageGrid.addEventListener('drop', async (e) => {
      e.preventDefault();
      imageGrid.classList.remove('drag-active');

      const files = Array.from(e.dataTransfer.files || []).filter(file => file.type.startsWith('image/'));
      if (files.length > 0) {
        await addPhotos(files);
      }
    });

    logoToggle.addEventListener('change', drawCollage);
    downloadBtn.addEventListener('click', downloadCollage);

    clearBtn.addEventListener('click', () => {
      photos = [];
      renderPhotoOrder();
      drawCollage();
    });

    async function addPhotos(files) {
      for (const file of files) {
        try {
          const dataUrl = await fileToDataUrl(file);
          const img = await loadImage(dataUrl);
          if (isImageDrawable(img)) {
            photos.push({ src: dataUrl, img });
          }
        } catch (error) {
          console.warn('Skipped broken image:', file.name, error);
        }
      }

      renderPhotoOrder();
      drawCollage();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Could not read file.'));
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Image failed to load.'));
        img.src = src;
      });
    }

    function isImageDrawable(img) {
      return img && img.complete && img.naturalWidth > 0 && img.naturalHeight > 0;
    }

    function renderPhotoOrder() {
      imageGrid.innerHTML = '';

      if (photos.length === 0) {
        const message = document.createElement('div');
        message.className = 'drop-message';
        message.innerHTML = 'Click to upload photos<br><span>or drag photos here</span>';
        imageGrid.appendChild(message);
        return;
      }

      photos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'image-item';
        item.draggable = true;
        item.dataset.index = index;

        const img = document.createElement('img');
        img.src = photo.src;

        const number = document.createElement('div');
        number.className = 'order-number';
        number.textContent = index + 1;

        const remove = document.createElement('button');
        remove.className = 'remove-btn';
        remove.textContent = '×';
        remove.onclick = (e) => {
          e.stopPropagation();
          photos.splice(index, 1);
          renderPhotoOrder();
          drawCollage();
        };

        item.appendChild(img);
        item.appendChild(number);
        item.appendChild(remove);

        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('dragleave', handleDragLeave);
        item.addEventListener('drop', handleDrop);
        item.addEventListener('dragend', handleDragEnd);

        imageGrid.appendChild(item);
      });
    }

    function handleDragStart(e) {
      dragStartIndex = Number(this.dataset.index);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(dragStartIndex));
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.stopPropagation();
      this.classList.add('drag-over');
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDragLeave() {
      this.classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      const dropIndex = Number(this.dataset.index);
      this.classList.remove('drag-over');

      if (dragStartIndex === null || dragStartIndex === dropIndex) return;
      if (!Number.isInteger(dragStartIndex) || !Number.isInteger(dropIndex)) return;
      if (dragStartIndex < 0 || dragStartIndex >= photos.length) return;
      if (dropIndex < 0 || dropIndex >= photos.length) return;

      const [movedPhoto] = photos.splice(dragStartIndex, 1);
      photos.splice(dropIndex, 0, movedPhoto);

      dragStartIndex = null;
      renderPhotoOrder();
      drawCollage();
    }

    function handleDragEnd() {
      document.querySelectorAll('.image-item').forEach(item => {
        item.classList.remove('dragging', 'drag-over');
      });
      dragStartIndex = null;
    }

    function drawCollage() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (photos.length === 0) {
        drawLogoIfNeeded();
        return;
      }

      const gap = 10;
      const padding = 10;
      const usableW = canvas.width - padding * 2;
      const usableH = canvas.height - padding * 2;

      let boxes = [];
      const count = photos.length;

      if (count === 1) {
        boxes = [{ x: padding, y: padding, w: usableW, h: usableH }];
      } else if (count === 2) {
        boxes = [
          { x: padding, y: padding, w: (usableW - gap) / 2, h: usableH },
          { x: padding + (usableW + gap) / 2, y: padding, w: (usableW - gap) / 2, h: usableH }
        ];
      } else if (count === 3) {
        boxes = [
          { x: padding, y: padding, w: usableW, h: (usableH - gap) / 2 },
          { x: padding, y: padding + (usableH + gap) / 2, w: (usableW - gap) / 2, h: (usableH - gap) / 2 },
          { x: padding + (usableW + gap) / 2, y: padding + (usableH + gap) / 2, w: (usableW - gap) / 2, h: (usableH - gap) / 2 }
        ];
      } else {
        const cols = 2;
        const rows = 2;
        const boxW = (usableW - gap) / cols;
        const boxH = (usableH - gap) / rows;

        boxes = [
          { x: padding, y: padding, w: boxW, h: boxH },
          { x: padding + boxW + gap, y: padding, w: boxW, h: boxH },
          { x: padding, y: padding + boxH + gap, w: boxW, h: boxH },
          { x: padding + boxW + gap, y: padding + boxH + gap, w: boxW, h: boxH }
        ];
      }

      const photosToDraw = photos.slice(0, boxes.length);
      photosToDraw.forEach((photo, index) => {
        drawImageCover(photo.img, boxes[index].x, boxes[index].y, boxes[index].w, boxes[index].h);
      });

      drawLogoIfNeeded();
    }

    function drawImageCover(img, x, y, w, h) {
      if (!isImageDrawable(img)) return;

      const imgRatio = img.naturalWidth / img.naturalHeight;
      const boxRatio = w / h;

      let sx, sy, sw, sh;

      if (imgRatio > boxRatio) {
        sh = img.naturalHeight;
        sw = img.naturalHeight * boxRatio;
        sx = (img.naturalWidth - sw) / 2;
        sy = 0;
      } else {
        sw = img.naturalWidth;
        sh = img.naturalWidth / boxRatio;
        sx = 0;
        sy = (img.naturalHeight - sh) / 2;
      }

      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
      ctx.restore();
    }

    function drawLogoIfNeeded() {
      if (!logoToggle.checked) return;
      if (!logoReady || !isImageDrawable(logo)) return;

      const baseSize = canvas.width * 0.28;
      const logoW = baseSize * 0.95; // 5% smaller
      const logoRatio = logo.naturalHeight / logo.naturalWidth;
      const logoH = logoW * logoRatio;
      const x = (canvas.width - logoW) / 2;
      const y = (canvas.height - logoH) / 2;

      ctx.save();

      // circle mask
      const radius = logoW / 2;
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();

      ctx.globalAlpha = 0.95;
      ctx.drawImage(logo, x, y, logoW, logoH);

      ctx.restore();
    }

    function downloadCollage() {
      drawCollage();
      const link = document.createElement('a');
      link.download = 'ocean-vacations-collage.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function runTests() {
      console.assert(typeof drawCollage === 'function', 'drawCollage should exist');
      console.assert(typeof drawImageCover === 'function', 'drawImageCover should exist');
      console.assert(isImageDrawable(null) === null, 'null image should not be drawable');

      const brokenImg = new Image();
      console.assert(isImageDrawable(brokenImg) === false, 'unloaded image should not be drawable');
      console.assert(typeof drawLogoIfNeeded === 'function', 'drawLogoIfNeeded should exist');
      console.assert(Array.isArray(logoSources) && logoSources.length === 1, 'logo should use the exact provided URL only');

      const originalPhotos = photos;
      photos = [];
      renderPhotoOrder();
      console.assert(imageGrid.querySelector('.drop-message'), 'empty state should show upload/drop message');
      photos = originalPhotos;
    }

    renderPhotoOrder();
    drawCollage();
    runTests();
  </script>
</body>
</html>
